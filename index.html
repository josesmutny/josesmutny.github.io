<!DOCTYPE html>

<meta charset="UTF-8">

<title>Zpěvník</title>

<style>
body {
    font-family: sans-serif;
    margin: 10px;
    background: #f4f4f9;
}

.controls {
    margin-bottom: 10px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}

button {
    padding: 6px 10px;
    font-size: 12px;
    border: none;
    border-radius: 4px;
    background: #007bff;
    color: white;
    cursor: pointer;
}

#draggable-list {
    column-gap: 10px;
}

@media (min-width: 400px) { #draggable-list { columns: 1; } }
@media (min-width: 700px) { #draggable-list { columns: 2; } }
@media (min-width: 1000px){ #draggable-list { columns: 3; } }
@media (min-width: 1300px){ #draggable-list { columns: 4; } }

.list-item {
    break-inside: avoid;
    background: white;
    margin: 2px 0;
    padding: 5px 8px;
    font-size: 13px;
    border-radius: 4px;

    display: flex;
    justify-content: space-between;
    align-items: center;

    cursor: grab;
    user-select: none;
    touch-action: none; /* 🔥 klíčové pro mobile */
}

.list-item.dragging {
    opacity: 0.5;
    background: #e0f7fa;
}

.text {
    pointer-events: none;
}

/* ⭐ */
.star {
    color: #ccc;
    cursor: pointer;
    font-size: 14px;
    flex-shrink: 0;
}

.star.selected {
    color: gold;
}
</style>
</head>

<body>

<div class="controls">
    <button id="copy-button">Copy All</button>
    <button id="copy-selected">Copy Selected</button>
    <button id="reset-button">Reset</button>

<ul id="draggable-list"></ul>

let currentEntries = [...initialEntries];
let selected = new Set();
const list = document.getElementById('draggable-list');

let draggedEl = null;

function renderList() {
    list.innerHTML = '';
    currentEntries.forEach(entry => {
        const li = document.createElement('li');
        li.className = 'list-item';
        li.dataset.id = entry.id;

        const text = document.createElement('span');
        text.className = 'text';
        text.textContent = entry.value;

        const star = document.createElement('span');
        star.className = 'star';
        star.textContent = '★';

        if (selected.has(entry.id)) star.classList.add('selected');

        star.onclick = (e) => {
            e.stopPropagation();
            selected.has(entry.id) ? selected.delete(entry.id) : selected.add(entry.id);
            star.classList.toggle('selected');
        };

        li.appendChild(text);
        li.appendChild(star);

        li.addEventListener('pointerdown', startDrag);

        list.appendChild(li);
    });
}

function startDrag(e) {
    if (e.target.classList.contains('star')) return;

    e.preventDefault(); // 🔥 zabraňuje výběru textu

    draggedEl = e.currentTarget;
    draggedEl.classList.add('dragging');

    draggedEl.setPointerCapture(e.pointerId);

    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', endDrag);
}

function onMove(e) {
    const items = [...list.querySelectorAll('.list-item:not(.dragging)')];

    let closest = null;
    let offset = Number.NEGATIVE_INFINITY;

    items.forEach(item => {
        const box = item.getBoundingClientRect();
        const o = e.clientY - box.top - box.height / 2;
        if (o < 0 && o > offset) {
            offset = o;
            closest = item;
        }
    });

    if (!closest) list.appendChild(draggedEl);
    else list.insertBefore(draggedEl, closest);
}

function endDrag(e) {
    draggedEl.releasePointerCapture(e.pointerId);

    draggedEl.classList.remove('dragging');
    draggedEl = null;

    document.removeEventListener('pointermove', onMove);
    document.removeEventListener('pointerup', endDrag);

    updateOrder();
}

function updateOrder() {
    const items = [...list.children];
    currentEntries = items.map(el =>
        initialEntries.find(e => e.id == el.dataset.id)
    );
}

document.getElementById('copy-button').onclick = () => {
    const text = currentEntries.map((e,i)=>`${e.value}, ${i+1}`).join('\n');
    navigator.clipboard.writeText(text);
};

document.getElementById('copy-selected').onclick = () => {
    const filtered = currentEntries.filter(e => selected.has(e.id));
    const text = filtered.map((e,i)=>`${e.value}, ${i+1}`).join('\n');
    navigator.clipboard.writeText(text);
};

document.getElementById('reset-button').onclick = () => {
    currentEntries = [...initialEntries];
    selected.clear();
    renderList();
};

renderList();
</script>
