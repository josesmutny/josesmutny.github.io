<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zpěvník</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 20px;
            background-color: #f4f4f9;
        }

        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 15px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #007bff;
            color: white;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #0056b3;
        }

        #draggable-list {
            list-style: none;
            padding: 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: white;
        }

        .list-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
            cursor: grab;
            background-color: #ffffff;
        }

        .list-item.dragging {
            opacity: 0.5;
            background-color: #e0f7fa;
        }

        .drop-placeholder {
            height: 50px;
            background-color: #add8e6;
            border: 2px dashed #007bff;
            margin: 5px 0;
            opacity: 0;
        }

        .drop-placeholder.visible {
            opacity: 1;
        }
    </style>
</head>
<body>

<div class="controls">

let currentEntries = [...initialEntries];
const list = document.getElementById('draggable-list');
const copyButton = document.getElementById('copy-button');
const resetButton = document.getElementById('reset-button');
let draggedItem = null;
let placeholder = null;

function renderList() {
    list.innerHTML = '';
    currentEntries.forEach(entry => {
        const item = document.createElement('li');
        item.className = 'list-item';
        item.draggable = true;
        item.dataset.id = entry.id;
        item.textContent = entry.value;

        item.addEventListener('dragstart', e => {
            draggedItem = item;
            setTimeout(() => item.classList.add('dragging'), 0);
        });

        item.addEventListener('dragend', () => {
            item.classList.remove('dragging');
            draggedItem = null;
            updateListOrder();
        });

        list.appendChild(item);
    });
}

function updateListOrder() {
    const items = Array.from(list.querySelectorAll('.list-item'));
    currentEntries = items.map(item =>
        initialEntries.find(e => e.id == item.dataset.id)
    );
}

copyButton.onclick = () => {
    const text = currentEntries.map((e,i)=>`${e.value}, ${i+1}`).join('\n');
    navigator.clipboard.writeText(text);
};

resetButton.onclick = () => {
    currentEntries = [...initialEntries];
    renderList();
};

renderList();
